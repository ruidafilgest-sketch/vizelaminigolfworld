backend:
  name: git-gateway
  branch: main

media_folder: "imagens"
public_folder: "/imagens"

locale: pt

collections:

  - name: "noticias"
    label: "Noticias"
    label_singular: "Noticia"
    folder: "_noticias"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titulo", name: "titulo", widget: "string" }
      - { label: "Data", name: "data", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Categoria"
        name: "categoria"
        widget: "select"
        options:
          - { label: "SWC 2026", value: "swc" }
          - { label: "Campeonato Nacional", value: "nacional" }
          - { label: "Internacional", value: "internacional" }
          - { label: "Local — Vizela", value: "local" }
          - { label: "Academia Vizelgolfe", value: "academia" }
      - { label: "Resumo", name: "resumo", widget: "text" }
      - { label: "Texto completo", name: "body", widget: "markdown" }
      - { label: "Foto (opcional)", name: "foto", widget: "image", required: false }

  - name: "diario"
    label: "Diario de Eventos"
    label_singular: "Entrada"
    folder: "_diario"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Titulo", name: "titulo", widget: "string" }
      - { label: "Data", name: "data", widget: "datetime", format: "DD/MM/YYYY", date_format: "DD/MM/YYYY", time_format: false }
      - label: "Tipo"
        name: "tipo"
        widget: "select"
        options:
          - { label: "SWC 2026", value: "swc" }
          - { label: "Nacional", value: "nacional" }
          - { label: "Local", value: "local" }
      - { label: "Descricao", name: "body", widget: "text" }

  - name: "galeria"
    label: "Galeria de Fotos"
    label_singular: "Foto"
    folder: "_galeria"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Legenda", name: "legenda", widget: "string" }
      - { label: "Fotografia", name: "foto", widget: "image" }
      - label: "Categoria"
        name: "categoria"
        widget: "select"
        options:
          - { label: "Campo Fonseca e Castro", value: "campo" }
          - { label: "SWC 2026", value: "swc" }
          - { label: "Nacional", value: "nacional" }
          - { label: "Atletas", value: "atletas" }
          - { label: "Vizela", value: "cidade" }
      - { label: "Descricao (opcional)", name: "descricao", widget: "text", required: false }
