html{scroll-behavior:smooth;}
body{background:var(--sage);color:var(--text);font-family:'Barlow',sans-serif;overflow-x:hidden;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--sage2);}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}

/* HEADER */
header{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:66px;
  background:rgba(8,18,42,0.97);
  border-bottom:1px solid rgba(200,148,58,0.18);
  backdrop-filter:blur(16px);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 44px;
}
.logo{display:flex;flex-direction:column;text-decoration:none;cursor:pointer;}
.logo-main{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--white);letter-spacing:0.5px;line-height:1.1;}
.logo-main .sep{color:var(--gold2);margin:0 7px;font-weight:300;opacity:0.6;}
.logo-main .world{color:var(--gold2);font-style:italic;}
.logo-sub{font-size:9px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-top:2px;}

nav{display:flex;align-items:center;gap:2px;}
.nb{padding:7px 14px;border-radius:4px;border:none;background:none;font-family:'Barlow',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.3px;color:rgba(255,255,255,0.45);cursor:pointer;transition:all 0.15s;}
.nb:hover{color:var(--gold2);background:rgba(200,148,58,0.08);}

.lang-row{display:flex;gap:3px;}
.lb{padding:5px 10px;border-radius:3px;border:1px solid rgba(200,148,58,0.22);background:none;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:600;letter-spacing:0.3px;color:rgba(255,255,255,0.4);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;}
.lb:hover{color:var(--gold2);border-color:var(--gold);}
.lb.on{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:700;}

.p:nth-child(4){width:2px;height:2px;left:83%;top:58%;opacity:0.38;animation-duration:14s;animation-delay:1s;}
.p:nth-child(5){width:3px;height:3px;left:22%;top:68%;opacity:0.2;animation-duration:11s;animation-delay:3.5s;}
.p:nth-child(6){width:2px;height:2px;left:58%;top:78%;opacity:0.28;animation-duration:13s;animation-delay:5s;}
.p:nth-child(7){width:2px;height:2px;left:35%;top:85%;opacity:0.18;animation-duration:15s;animation-delay:7s;}
@keyframes float{0%{transform:translateY(0) rotate(0deg);opacity:0;}10%{opacity:0.45;}88%{opacity:0.15;}100%{transform:translateY(-90px) rotate(360deg);opacity:0;}}

.hero-content{position:relative;z-index:2;max-width:900px;}

.hero-line{width:0;height:2px;background:linear-gradient(to right,transparent,var(--gold2),transparent);margin:0 auto 30px;animation:expandLine 1s cubic-bezier(0.16,1,0.3,1) 0.2s both;}
@keyframes expandLine{from{width:0;opacity:0;}to{width:70px;opacity:1;}}

.hero-kicker{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:6px;text-transform:uppercase;
  color:var(--gold2);margin-bottom:30px;
  animation:rise 1s cubic-bezier(0.16,1,0.3,1) 0.3s both;
}

.hero-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(56px,9.5vw,116px);
  font-weight:700;line-height:0.9;letter-spacing:-2px;
  margin-bottom:0;
}
.word-vizela{
  display:block;color:#ffffff;
  animation:rise 1s cubic-bezier(0.16,1,0.3,1) 0.42s both;
}
.word-minigolf{
  display:block;color:var(--gold2);font-style:italic;
  animation:rise 1s cubic-bezier(0.16,1,0.3,1) 0.56s both;
}
.word-world{
  display:block;color:#ffffff;
  animation:rise 1s cubic-bezier(0.16,1,0.3,1) 0.7s both;
}
.word-dot{color:var(--gold);opacity:0.5;font-size:0.38em;vertical-align:middle;margin:0 14px;font-style:normal;}

.hero-divider{width:0;height:1px;background:linear-gradient(to right,transparent,rgba(232,176,74,0.45),transparent);margin:30px auto;animation:expandLine 0.8s ease 0.85s both;}

.hero-tagline{
  font-size:clamp(15px,2vw,20px);color:rgba(255,255,255,0.72);
  font-weight:300;line-height:1.72;margin:0 auto 52px;letter-spacing:0.4px;
  max-width:640px;
  animation:rise 1s cubic-bezier(0.16,1,0.3,1) 0.9s both;
}

/* SWC BADGE */
.swc-badge{
  display:inline-flex;flex-direction:column;align-items:center;
  background:rgba(8,18,42,0.72);
  border:1px solid rgba(200,148,58,0.4);
  border-top:2px solid var(--gold);
  padding:26px 52px;
  animation:rise 1s cubic-bezier(0.16,1,0.3,1) 1.0s both;
  backdrop-filter:blur(14px);
  box-shadow:0 24px 64px rgba(0,0,0,0.55),0 0 0 1px rgba(200,148,58,0.08),inset 0 1px 0 rgba(200,148,58,0.12);
  position:relative;
}
.swc-badge::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:2px;background:var(--gold2);}
.swc-kicker{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(232,176,74,0.7);margin-bottom:10px;}
.swc-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:#ffffff;margin-bottom:6px;letter-spacing:0.3px;}
.swc-date{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:3px;margin-bottom:22px;font-weight:600;text-transform:uppercase;}
.swc-cd{display:flex;gap:36px;}
.cd-unit{text-align:center;position:relative;}
.cd-unit:not(:last-child)::after{content:'·';position:absolute;right:-22px;top:8px;color:rgba(200,148,58,0.25);font-size:22px;}
.cd-n{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:700;color:var(--gold2);line-height:1;display:block;letter-spacing:-1px;}
.cd-l{font-size:8px;color:rgba(255,255,255,0.3);letter-spacing:3px;text-transform:uppercase;margin-top:5px;}

@keyframes rise{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}

/* BAND */
.band{background:var(--navy2);display:flex;align-items:center;justify-content:center;gap:0;flex-wrap:wrap;border-bottom:1px solid rgba(200,148,58,0.12);}
.band-item{padding:16px 28px;display:flex;flex-direction:column;align-items:center;border-right:1px solid rgba(255,255,255,0.06);}
.band-item:last-child{border-right:none;}
.band-n{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--gold2);line-height:1;}
.band-l{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}

.page{max-width:1120px;margin:0 auto;}
section{padding:80px 44px;}
.section-kicker{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blue2);display:block;margin-bottom:10px;}
.section-title{font-family:'Cormorant Garamond',serif;font-size:clamp(30px,4.5vw,50px);font-weight:700;color:var(--navy);line-height:1.1;margin-bottom:18px;}
.section-title em{color:var(--blue);font-style:italic;}
.section-lead{font-size:16px;color:var(--muted);line-height:1.75;max-width:580px;font-weight:300;}
.divider{height:1px;background:var(--border2);margin:0 44px;}

/* NEWS */
.news-bg{background:#dce3f0;}
.news-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--border2);margin-top:44px;border:1px solid var(--border2);}
.news-card{background:#e8edf8;padding:28px;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);cursor:pointer;position:relative;overflow:hidden;}
.news-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(to right,var(--blue),var(--gold2));transition:width 0.3s ease;}
.news-card:hover{background:#dce3f0;transform:translateY(-3px);box-shadow:0 8px 30px rgba(26,58,107,0.12);}
.news-card:hover::after{width:100%;}
.news-card.lead{grid-column:span 2;border-right:1px solid var(--border2);}
.nc-kicker{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;display:inline-block;}
.kicker-swc{color:var(--gold);}
.kicker-nat{color:var(--blue);}
.kicker-loc{color:var(--blue2);}
.kicker-int{color:var(--navy3);}
.nc-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--navy);line-height:1.25;margin-bottom:10px;}
.news-card.lead .nc-title{font-size:28px;}
.nc-text{font-size:13px;color:var(--muted);line-height:1.65;font-weight:300;}
.nc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.nc-date{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:0.3px;}
.nc-arrow{font-size:16px;color:var(--blue);font-weight:300;}

/* SWC SECTION */
.swc-sec{background:var(--navy);position:relative;overflow:hidden;}
.swc-sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(26,58,107,0.25) 0%,transparent 70%);}
.swc-sec .section-kicker{color:var(--gold2);}
.swc-sec .section-title{color:var(--white);}
.swc-sec .section-title em{color:var(--gold2);}
.swc-sec .section-lead{color:rgba(255,255,255,0.5);}
.swc-layout{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;margin-top:50px;position:relative;z-index:1;}
.swc-facts{display:flex;flex-direction:column;gap:0;border:1px solid rgba(255,255,255,0.07);}
.sf{display:flex;align-items:flex-start;gap:20px;padding:20px 22px;border-bottom:1px solid rgba(255,255,255,0.06);transition:background 0.15s;}
.sf:last-child{border-bottom:none;}
.sf:hover{background:rgba(255,255,255,0.03);}
.sf-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold2);min-width:100px;flex-shrink:0;margin-top:2px;}
.sf-val{font-size:14px;color:rgba(255,255,255,0.72);line-height:1.55;font-weight:300;}
.sf-val strong{color:var(--white);font-weight:500;}

.team-block{position:relative;z-index:1;}
.team-kicker{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold2);margin-bottom:20px;}
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.athlete{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid rgba(255,255,255,0.07);transition:border-color 0.15s;}
.athlete:hover{border-color:rgba(200,148,58,0.3);}
.ath-init{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:var(--white);flex-shrink:0;}
.init-m{background:var(--blue);}
.init-f{background:var(--gold);}
.ath-name{font-size:12px;font-weight:500;color:var(--white);line-height:1.2;}
.ath-cat{font-size:10px;color:rgba(255,255,255,0.32);letter-spacing:0.3px;}

/* HISTORY */
.hist-sec{background:#dce3f0;}
.hist-layout{display:grid;grid-template-columns:1fr 1fr;gap:70px;align-items:start;margin-top:50px;}
.hist-text p{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:16px;font-weight:300;}
.hist-text p strong{color:var(--navy);font-weight:600;}
.timeline{position:relative;padding-left:30px;}
.timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:1px;background:var(--border2);}
/* SCROLL REVEAL */
.reveal{opacity:0;transform:translateY(40px);transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1);}
.reveal.visible{opacity:1;transform:translateY(0);}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1);}
.reveal-left.visible{opacity:1;transform:translateX(0);}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1),transform 0.7s cubic-bezier(0.16,1,0.3,1);}
.reveal-right.visible{opacity:1;transform:translateX(0);}

.tl-item{position:relative;margin-bottom:28px;padding:10px 12px;border-left:2px solid transparent;transition:all 0.2s ease;}
.tl-item:hover{border-left-color:var(--blue2);background:rgba(26,58,107,0.04);padding-left:16px;}
.tl-item.gold-item:hover{border-left-color:var(--gold2);background:rgba(200,148,58,0.04);}
.tl-item:last-child{margin-bottom:0;}

.c-flag{font-size:26px;display:block;margin-bottom:6px;transition:transform 0.2s ease;}
.country:hover .c-flag{transform:scale(1.2);}
.athlete{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid rgba(255,255,255,0.07);transition:all 0.2s ease;}
.athlete:hover{border-color:rgba(200,148,58,0.4);background:rgba(200,148,58,0.05);transform:translateX(4px);}
.lc-arrow{transition:transform 0.2s ease;}
.link-card:hover .lc-arrow{transform:translateX(6px);}
.tl-dot{position:absolute;left:-30px;top:4px;width:13px;height:13px;border-radius:50%;background:var(--blue);border:2px solid var(--sage);box-shadow:0 0 0 1px var(--blue2);}
.tl-item.gold-item .tl-dot{background:var(--gold);box-shadow:0 0 0 1px var(--gold2);}
.tl-year{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:var(--blue);margin-bottom:4px;}
.tl-item.gold-item .tl-year{color:var(--gold);}
.tl-title{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:3px;}
.tl-desc{font-size:13px;color:var(--muted);line-height:1.55;font-weight:300;}

/* COUNTRIES */
.countries-sec{background:var(--navy);position:relative;overflow:hidden;}
.countries-sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 50%,rgba(26,58,107,0.2) 0%,transparent 65%);}
.countries-sec .section-kicker{color:rgba(255,255,255,0.45);}
.countries-sec .section-title{color:var(--white);}
.countries-sec .section-title em{color:var(--gold2);}
.countries-sec .section-lead{color:rgba(255,255,255,0.55);}
.countries-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-top:44px;position:relative;z-index:1;}
.country{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.09);padding:14px 10px;text-align:center;transition:all 0.2s;cursor:default;}
.country:hover{background:rgba(232,176,74,0.08);border-color:rgba(200,148,58,0.2);}
.c-flag{font-size:26px;display:block;margin-bottom:6px;}
.c-name{font-size:11px;color:rgba(255,255,255,0.65);font-weight:500;}
.c-note{grid-column:1/-1;font-size:11px;color:rgba(255,255,255,0.3);letter-spacing:0.5px;font-style:italic;margin-top:6px;position:relative;z-index:1;}

/* VIZELA */
.vizela-sec{background:#d5dded;}
.vizela-layout{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:start;margin-top:50px;}
.vizela-text p{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:16px;font-weight:300;}
.vizela-text p strong{color:var(--navy);font-weight:600;}
.vizela-facts{display:flex;flex-direction:column;gap:0;border:1px solid var(--border2);}
.vf{display:grid;grid-template-columns:28px 1fr;gap:14px;padding:18px 20px;border-bottom:1px solid var(--border);align-items:flex-start;background:#dce3f0;}
.vf:last-child{border-bottom:none;}
.vf-icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--blue);margin-top:1px;}
.vf-icon svg{width:14px;height:14px;fill:none;stroke:var(--white);stroke-width:1.8;}
.vf-title{font-size:13px;font-weight:600;color:var(--navy);margin-bottom:2px;}
.vf-desc{font-size:12px;color:var(--muted);line-height:1.5;font-weight:300;}

/* GALLERY */
.gallery-sec{background:#cdd6e8;}
.gallery-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:220px 220px;gap:8px;margin-top:44px;}
.gallery-item{background:var(--sage2);overflow:hidden;position:relative;cursor:pointer;}
.gallery-item:first-child{grid-row:span 2;}
.gallery-item img{width:100%;height:100%;object-fit:cover;filter:saturate(0.82);transition:transform 0.5s ease,filter 0.4s;}
.gallery-item:hover img{transform:scale(1.07);filter:saturate(1.1) brightness(1.05);}
.gallery-item::before{content:'';position:absolute;inset:0;background:rgba(8,18,42,0);transition:background 0.3s;z-index:1;}
.gallery-item:hover::before{background:rgba(8,18,42,0.15);}
.gallery-item .gallery-caption{transition:transform 0.3s ease,opacity 0.3s;transform:translateY(0);}
.gallery-item:hover .gallery-caption{transform:translateY(-4px);}
.gallery-caption{position:absolute;bottom:0;left:0;right:0;padding:12px 14px;background:linear-gradient(to top,rgba(8,18,42,0.75),transparent);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.8);}
.gallery-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);border:1px dashed var(--border2);}
.gp-icon{width:24px;height:24px;opacity:0.4;}
.gp-text{font-size:11px;letter-spacing:1px;text-transform:uppercase;opacity:0.5;}

/* DIARY */
.diary-sec{background:#d5dded;}
.diary-list{margin-top:44px;display:flex;flex-direction:column;gap:0;border:1px solid var(--border2);}
.diary-item{display:grid;grid-template-columns:90px 1fr;gap:0;border-bottom:1px solid var(--border);transition:all 0.2s ease;}
.diary-item:last-child{border-bottom:none;}
.diary-item:hover{background:rgba(26,58,107,0.06);transform:translateX(4px);}
.diary-item:hover .di-day{color:var(--blue2)!important;}
.diary-item.swc-entry{border-left:3px solid var(--gold);}
.diary-item.swc-entry .di-day{color:var(--gold);}
.di-date{padding:22px 20px;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;background:#cdd6e8;}
.di-day{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;color:var(--blue);line-height:1;}
.di-month{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.di-body{padding:22px 26px;background:#dce3f0;}
.di-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:2px 8px;margin-bottom:8px;display:inline-block;}
.tag-swc{background:rgba(200,148,58,0.12);color:var(--gold);}
.tag-nat{background:rgba(26,58,107,0.1);color:var(--blue);}
.di-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--navy);margin-bottom:6px;}
.di-text{font-size:13px;color:var(--muted);line-height:1.65;font-weight:300;}

/* LINKS */
.links-sec{background:var(--navy2);}
.links-sec .section-kicker{color:rgba(255,255,255,0.35);}
.links-sec .section-title{color:var(--white);}
.links-sec .section-title em{color:var(--gold2);}
.links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:rgba(255,255,255,0.05);margin-top:44px;border:1px solid rgba(255,255,255,0.05);}
.link-card{background:rgba(255,255,255,0.03);padding:26px 24px;text-decoration:none;display:flex;flex-direction:column;gap:10px;transition:all 0.25s cubic-bezier(0.16,1,0.3,1);border-bottom:2px solid transparent;}
.link-card:hover{background:rgba(200,148,58,0.08);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.2);border-bottom-color:var(--gold2);}
.link-card:hover .lc-arrow{transform:translateX(5px);}
.lc-arrow{transition:transform 0.2s ease;}
.lc-type{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold2);}
.lc-name{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--white);line-height:1.2;}
.lc-desc{font-size:12px;color:rgba(255,255,255,0.38);line-height:1.5;font-weight:300;}
.lc-url{font-size:11px;color:rgba(255,255,255,0.22);margin-top:4px;}
.lc-arrow{color:var(--gold2);font-size:18px;margin-top:auto;}

/* FOOTER */
footer{background:var(--ink2);padding:56px 44px 32px;}
.footer-top{display:grid;grid-template-columns:1fr 1fr;gap:48px;padding-bottom:36px;border-bottom:1px solid rgba(255,255,255,0.06);margin-bottom:24px;}
.footer-brand .fb-name{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--white);margin-bottom:6px;}
.footer-brand .fb-name .sep{color:var(--gold2);font-weight:300;}
.footer-brand .fb-name .world{color:var(--gold2);font-style:italic;}
.footer-brand .fb-desc{font-size:13px;color:rgba(255,255,255,0.3);line-height:1.7;font-weight:300;max-width:320px;}
.footer-note{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:18px 20px;align-self:start;}
.fn-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:8px;display:block;}
.fn-text{font-size:12px;color:rgba(255,255,255,0.3);line-height:1.65;font-weight:300;}
.footer-copy{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.fc-left{font-size:11px;color:rgba(255,255,255,0.18);}
.fc-left strong{color:rgba(255,255,255,0.38);font-weight:500;}
.fc-right{font-size:11px;color:rgba(255,255,255,0.13);}

@media(max-width:900px){
  header{padding:0 20px;}
  nav{display:none;}
  section{padding:56px 20px;}
  .hero{padding:90px 22px 60px;text-align:center;}
  .band-item{padding:12px 16px;}
  .news-grid{grid-template-columns:1fr;}
  .news-card.lead{grid-column:span 1;}
  .swc-layout,.hist-layout,.vizela-layout,.footer-top{grid-template-columns:1fr;}
  .gallery-grid{grid-template-columns:1fr 1fr;grid-template-rows:auto;}
  .gallery-item:first-child{grid-row:span 1;}
  .divider{margin:0 20px;}
  footer{padding:44px 20px 24px;}
  .hero-title{font-size:clamp(42px,12vw,72px);letter-spacing:-1px;}
